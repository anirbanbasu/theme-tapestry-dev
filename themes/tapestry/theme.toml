name = "tapestry"
description = "A Zola theme for academic and industry researcher profile websites, derived from and backward-compatible with terminus"
tags = ["scholarly", "academic", "portfolio", "blog", "minimal", "personal", "responsive", "seo"]
license = "MIT"
homepage = "https://github.com/anirbanbasu/tapestry"
min_version = "0.22.0"
demo = "https://anirbanbasu.github.io/tapestry"

[author]
name = "Anirban Basu"
homepage = "https://www.anirbanbasu.com"
repo = "https://github.com/anirbanbasu/tapestry"

[original]
author = "ebkalderon"
homepage = "https://eyalkalderon.com"
repo = "https://github.com/ebkalderon/terminus"

[extra]
# Presentation style group + variant (see CONSTITUTION.md §7).
#
# Maximum of 5 preset style groups; each may offer multiple fully-specified
# variants. Unset or invalid `presentation_style`/`presentation_variant`
# values fall back to "scholarly"/"contemporary-research-lab" unconditionally
# (CONSTITUTION.md §7, amendment 2026-JUL-04-009) — this applies even when
# migrating from a terminus site that still has `extra.color_scheme` /
# `extra.color_scheme_switcher` set; those keys are inert under Tapestry and
# are deliberately not read, mapped, or migrated (see
# specs/terminus-compat-contract.md §9).
presentation_style = "scholarly"
presentation_variant = "contemporary-research-lab"

# Opt-in presentation style/variant switcher (CONSTITUTION.md §2, amendment
# 2026-JUL-05-002): a disclosure menu next to the theme switcher listing
# every implemented `<style>/<variant>` combination, letting a visitor
# preview a different look live without a page reload. Requires JS (one of
# the three sanctioned exceptions) — default off; a site opts in explicitly.
presentation_style_switcher = false

# Add global stylesheets to support user-defined customisation.
#
# Global styles added through stylesheets here may be overridden on individual pages or sections
# by specifying corresponding styles and setting them up for use through
# `page.extra.stylesheets` or `section.extra.stylesheets`, respectively.
# stylesheets = []

# Customize the copyright text shown in the site footer using markdown.
#
# Strings delimited by `::` will be split into mobile-responsive HTML spans. If
# present, the placeholder values `$YEAR` and `$AUTHOR` are templated with the
# current year and the site author defined in your `config.toml`, respectively.
copyright = "© $YEAR $AUTHOR :: Powered by [Zola](https://www.getzola.org) :: [Tapestry](https://github.com/anirbanbasu/tapestry) theme."

# favicon = "images/logo/logo-01-woven-monogram-square.svg"
# favicon_emoji = "👨‍💻"

# Show RSS feed icon in the site footer alongside any `socials` defined below.
#
# Set to `true` to use the default "rss" icon, or specify a custom icon name
# (e.g. "atom"). The icon must exist in `static/images/social_icons/` (without
# the `.svg` extension).
#
# Note: If multiple feed filenames are defined, Atom feeds and RSS feeds will
# be shown with different icons to remain distinguishable from one another.
feed_icon = true

# Enable Mastodon link attribution. See here for details:
# https://blog.joinmastodon.org/2024/07/highlighting-journalism-on-mastodon/
# fediverse_creator = "@user@mastodon.social"

# Sets the header text to a value other than the contents of `config.title`.
# header_title = "My custom title"

# Sets a custom logo using an image file. Can be an SVG image.
#
# Note: when unset, Tapestry renders its own brand logo (see
# specs/brand-logo.md) instead of falling back to text.
# header_logo = "images/logo/logo.svg"

# Enable KaTeX support for all posts. Rendered client-side via
# js/katex.min.js (one of the three sanctioned JS exceptions) — see
# specs/terminus-compat-contract.md §7.
katex = false

# Valid options are "center", "left", or "full-width".
layout = "center"

# Display default author on all pages without `authors = [...]` in frontmatter.
show_default_author = true

# main_menu = [
#     { name = "internal link 1", url = "resume.pdf" },
#     { name = "internal link 2", url = "blog", trailing_slash = true },
#     { name = "external link", url = "https://github.com", new_tab = true },
# ]

# socials = [
#     { name = "email", url = "mailto:hello@example.com" },
#     { name = "github", url = "https://github.com/anirbanbasu" },
# ]

[extra.content_security_policy]
enable = true
allowed_domains = []

[extra.responsive_images]
widths = [320, 640, 784, 1280, 1920, 2560]
fallback_width = 1280
