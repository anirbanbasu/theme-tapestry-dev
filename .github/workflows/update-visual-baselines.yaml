name: Update visual regression baselines

on:
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

env:
  ZOLA_VERSION: "0.22.1"

jobs:
  update-baselines:
    name: Update screenshots
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Zola ${{ env.ZOLA_VERSION }}
        run: |
          curl -sSL "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          sudo mv zola /usr/local/bin/zola
          zola --version
      - name: zola build (local base URL for CI-served tests)
        run: zola build --base-url http://127.0.0.1:1111
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tests/visual-a11y/package-lock.json
      - name: npm ci
        working-directory: tests/visual-a11y
        run: npm ci
      - name: Install Playwright browsers
        working-directory: tests/visual-a11y
        run: npx playwright install --with-deps chromium
      - name: Update screenshot baselines
        working-directory: tests/visual-a11y
        run: npx playwright test tests/visual.spec.ts --update-snapshots
      - name: Open PR with updated baselines
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "chore: update visual regression baselines"
          title: "chore: update visual regression baselines"
          body: |
            Automated baseline update, triggered manually via `workflow_dispatch`
            on `ubuntu-latest` (design spec §5 — baselines are never generated
            locally, since font rendering differs between a contributor's machine
            and this runner).

            Review the diffed PNGs under `tests/visual-a11y/screenshots/` before
            merging: confirm every changed image reflects an intentional design
            change, not a regression.
          branch: update-visual-baselines
          add-paths: tests/visual-a11y/screenshots/**
          delete-branch: true
