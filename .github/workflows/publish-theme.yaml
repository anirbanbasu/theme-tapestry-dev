name: Publish theme

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout monorepo at tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: monorepo

      - name: Checkout tapestry (distribution repo)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: anirbanbasu/tapestry
          ssh-key: ${{ secrets.TAPESTRY_DEPLOY_KEY }}
          path: tapestry
          fetch-depth: 0

      - name: Sync theme files into the distribution checkout
        run: |
          rsync -a --delete --exclude='.git' monorepo/themes/tapestry/ tapestry/

      - name: Commit and push the release as a single squashed commit
        working-directory: tapestry
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No file changes for ${RELEASE_TAG}; nothing to publish."
            exit 0
          fi
          git commit -m "Release ${RELEASE_TAG}"
          git tag "${RELEASE_TAG}"
          git push origin HEAD:main
          git push origin "${RELEASE_TAG}"
