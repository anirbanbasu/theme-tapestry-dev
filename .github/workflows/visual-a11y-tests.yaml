name: Visual & accessibility tests

on:
  pull_request:
    branches:
      - master
    paths:
      - "themes/tapestry/**"
      - "content/warp-and-weft/**"
      - "tests/**"
      - "config.toml"

permissions:
  contents: read

concurrency:
  group: "visual-a11y-${{ github.ref }}"
  cancel-in-progress: true

env:
  ZOLA_VERSION: "0.22.1"

jobs:
  check:
    name: zola check
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Zola ${{ env.ZOLA_VERSION }}
        run: |
          curl -sSL "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          sudo mv zola /usr/local/bin/zola
          zola --version
      - name: zola check
        run: zola check

  build:
    name: zola build
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Zola ${{ env.ZOLA_VERSION }}
        run: |
          curl -sSL "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          sudo mv zola /usr/local/bin/zola
          zola --version
      - name: zola build (local base URL for CI-served tests)
        run: zola build --base-url http://127.0.0.1:1111
      - name: Upload public/ artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zola-public
          path: public/
          retention-days: 1

  test:
    name: test (${{ matrix.group }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        group: [scholarly, creative, natural, precision, collective]
    defaults:
      run:
        working-directory: tests/visual-a11y
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Download public/ artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: zola-public
          path: public/
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tests/visual-a11y/package-lock.json
      - name: npm ci
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run accessibility sweep for this group
        env:
          STYLE_GROUP: ${{ matrix.group }}
        run: npx playwright test tests/a11y.spec.ts
      - name: Run visual regression for this group
        env:
          STYLE_GROUP: ${{ matrix.group }}
        run: npx playwright test tests/visual.spec.ts
      - name: Run keyboard-only checks for this group
        env:
          STYLE_GROUP: ${{ matrix.group }}
        run: npx playwright test tests/keyboard.spec.ts
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-${{ matrix.group }}
          path: tests/visual-a11y/playwright-report/
          retention-days: 7
